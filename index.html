<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNE CashFlow - Connexion</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- EmailJS pour les relances par email -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Logo et titre -->
            <div class="login-header">
                <h1>FNE CashFlow</h1>
                <p>Suivi des factures et paiements pour PME</p>
            </div>
            
            <!-- Formulaire de connexion -->
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="votre@email.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn-primary" id="loginBtn">
                    Se connecter
                </button>
                
                <div class="login-error" id="loginError"></div>
            </form>
            
            <!-- Lien d'inscription -->
            <div class="login-footer">
                <p>Pas encore de compte ?</p>
                <button type="button" class="btn-secondary" id="showRegisterBtn">
                    Créer un compte
                </button>
            </div>
        </div>
    </div>
    
    <!-- Modal d'inscription -->
    <div class="modal" id="registerModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Créer un compte</h2>
                <button class="modal-close" id="closeRegisterBtn">&times;</button>
            </div>
            
            <form id="registerForm" class="register-form">
                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" required placeholder="votre@email.com">
                </div>
                
                <div class="form-group">
                    <label for="registerPassword">Mot de passe</label>
                    <input type="password" id="registerPassword" required placeholder="Min. 6 caractères">
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirmer le mot de passe</label>
                    <input type="password" id="confirmPassword" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn-primary" id="registerBtn">
                    S'inscrire
                </button>
                
                <div class="register-error" id="registerError"></div>
            </form>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
