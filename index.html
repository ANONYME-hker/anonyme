<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Je t'aime Oceanne 💕</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="stars"></div>
        <div class="hearts"></div>
        
        <main class="love-message">
            <div class="message-container">
                <h1 class="title">Oceanne</h1>
                <div class="typewriter">
                    <p class="love-text">Je t'aime de tout mon cœur 💕</p>
                </div>
                <div class="reasons">
                    <p class="reason fade-in">Tu es la lumière de ma vie</p>
                    <p class="reason fade-in">Ton sourire illumine mes jours</p>
                    <p class="reason fade-in">Chaque moment avec toi est un trésor</p>
                    <p class="reason fade-in">Tu es mon rêve devenu réalité</p>
                </div>
                <div class="interactive-area">
                    <button class="love-button" id="loveBtn">
                        <span>Clique ici</span>
                        <div class="pulse"></div>
                    </button>
                    <div class="surprise-message" id="surprise">
                        <p>Tu es mon amour éternel ❤️</p>
                        <div class="heart-explosion"></div>
                    </div>
                </div>
            </div>
        </main>

        <div class="photo-gallery">
            <div class="gallery-title">Nos souvenirs précieux</div>
            <div class="photo-grid">
                <div class="photo-placeholder">
                    <div class="heart-icon">💕</div>
                    <span>Nos rires</span>
                </div>
                <div class="photo-placeholder">
                    <div class="heart-icon">💖</div>
                    <span>Nos câlins</span>
                </div>
                <div class="photo-placeholder">
                    <div class="heart-icon">💗</div>
                    <span>Nos rêves</span>
                </div>
                <div class="photo-placeholder">
                    <div class="heart-icon">💝</div>
                    <span>Notre amour</span>
                </div>
            </div>
        </div>

        <div class="music-note">🎵</div>
        <div class="floating-hearts"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
