<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNE CashFlow - Paiements</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="paiements.css">
</head>
<body class="has-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>FNE CashFlow</h1>
            <button class="sidebar-close" id="sidebarClose">&times;</button>
        </div>
        <nav class="sidebar-nav">
            <ul class="nav-list">
                <li class="nav-item">
                    <a href="dashboard.html" class="nav-link" data-page="dashboard">
                        <span class="nav-icon">📊</span>
                        <span class="nav-text">Tableau de bord</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="clients.html" class="nav-link" data-page="clients">
                        <span class="nav-icon">👥</span>
                        <span class="nav-text">Clients</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="factures.html" class="nav-link" data-page="factures">
                        <span class="nav-icon">📄</span>
                        <span class="nav-text">Factures</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="paiements.html" class="nav-link active" data-page="paiements">
                        <span class="nav-icon">💰</span>
                        <span class="nav-text">Paiements</span>
                    </a>
                </li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <button class="logout-btn" id="logoutBtn">
                <span class="nav-icon">🚪</span>
                <span class="nav-text">Déconnexion</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="header">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <div class="header-title"><h2>Paiements</h2></div>
            <div class="header-user">
                <span class="user-email" id="userEmail">chargement...</span>
            </div>
        </header>

        <div class="page-content">
            <div class="page-actions">
                <button class="btn-primary" id="addPaiementBtn">
                    <span>➕</span> Enregistrer un paiement
                </button>
            </div>

            <!-- Factures en attente -->
            <div class="factures-impayees">
                <div class="section-header">
                    <h3>Factures en attente de paiement</h3>
                    <span class="factures-count" id="facturesImpayeesCount">0 facture</span>
                </div>
                <div class="factures-list" id="facturesImpayeesList">
                    <div class="empty-state"><p>Chargement...</p></div>
                </div>
            </div>

            <!-- Historique paiements -->
            <div class="paiements-historique">
                <div class="section-header">
                    <h3>Historique des paiements</h3>
                    <span class="paiements-count" id="paiementsCount">0 paiement</span>
                </div>
                <div class="paiements-list" id="paiementsList">
                    <div class="empty-state"><p>Chargement...</p></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Paiement -->
    <div class="modal" id="paiementModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Enregistrer un paiement</h2>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <form id="paiementForm" class="paiement-form">
                <input type="hidden" id="factureId">
                <input type="hidden" id="clientId">
                <input type="hidden" id="clientNom">
                <input type="hidden" id="factureDescription">
                <input type="hidden" id="resteAPayer">

                <div class="form-group">
                    <label>Facture concernée</label>
                    <div class="facture-info" id="factureInfo"></div>
                </div>

                <div class="form-group">
                    <label for="paiementMontant">Montant du paiement (FCFA) *</label>
                    <input type="number" id="paiementMontant" required min="1" step="1" placeholder="Ex: 25000" style="width:100%">
                </div>

                <div class="form-group">
                    <label for="paiementMethode">Méthode de paiement *</label>
                    <select id="paiementMethode" required>
                        <option value="">Sélectionner une méthode</option>
                        <option value="cash">💵 Cash</option>
                        <option value="orange_money">🟠 Orange Money</option>
                        <option value="wave">🟡 Wave</option>
                        <option value="mtn">🟡 MTN Money</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="paiementDate">Date du paiement *</label>
                    <input type="date" id="paiementDate" required>
                </div>

                <div class="form-group">
                    <label for="paiementNote">Note (optionnel)</label>
                    <textarea id="paiementNote" placeholder="Ajouter une note..." rows="3"></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancelBtn">Annuler</button>
                    <button type="submit" class="btn-primary" id="savePaiementBtn">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
    <script>

        // ===== VARIABLES GLOBALES =====
        let factures = [];
        let paiements = [];
        let currentFactureId = null;

        // ===== POINT D'ENTRÉE =====
        document.addEventListener('DOMContentLoaded', function() {
            firebase.auth().onAuthStateChanged(function(user) {
                if (user) {
                    document.getElementById('userEmail').textContent = user.email;
                    setupSidebar();
                    setupEventListeners();
                    loadFacturesImpayees();
                    loadPaiements();
                } else {
                    window.location.href = 'index.html';
                }
            });
        });

        // ===== SIDEBAR =====
        function setupSidebar() {
            const menuToggle = document.getElementById('menuToggle');
            const sidebarClose = document.getElementById('sidebarClose');
            const sidebar = document.getElementById('sidebar');

            menuToggle.addEventListener('click', () => sidebar.classList.add('open'));
            sidebarClose.addEventListener('click', () => sidebar.classList.remove('open'));
            document.getElementById('logoutBtn').addEventListener('click', () => {
                firebase.auth().signOut().then(() => {
                    window.location.href = 'index.html';
                });
            });
        }

        // ===== ÉVÉNEMENTS =====
        function setupEventListeners() {
            document.getElementById('addPaiementBtn').addEventListener('click', () => openPaiementModal());
            document.getElementById('closeModalBtn').addEventListener('click', closePaiementModal);
            document.getElementById('cancelBtn').addEventListener('click', closePaiementModal);
            document.getElementById('paiementForm').addEventListener('submit', savePaiement);
            document.getElementById('paiementModal').addEventListener('click', (e) => {
                if (e.target.id === 'paiementModal') closePaiementModal();
            });
        }

        // ===== CHARGER LES FACTURES IMPAYÉES =====
        async function loadFacturesImpayees() {
            try {
                const userId = firebase.auth().currentUser.uid;

                // Charger TOUTES les factures sans filtre statut
                const snapshot = await firebase.firestore()
                    .collection('users').doc(userId)
                    .collection('factures')
                    .get();

                const facturesBase = [];
                snapshot.forEach(doc => {
                    facturesBase.push({ id: doc.id, ...doc.data() });
                });

                // Calculer les montants réels pour chaque facture
                factures = await Promise.all(
                    facturesBase.map(f => calculateFactureStatus(f, userId))
                );

                // Filtrer en JS — garder seulement impayées et partielles
                factures = factures.filter(f => f.statut !== 'paye');

                // Trier par date
                factures.sort((a, b) => {
                    const da = a.date?.toDate ? a.date.toDate() : new Date(a.date);
                    const db2 = b.date?.toDate ? b.date.toDate() : new Date(b.date);
                    return db2 - da;
                });

                displayFacturesImpayees(factures);

            } catch (error) {
                console.error('Erreur chargement factures:', error);
            }
        }

        // Mettre à jour automatiquement une facture après paiement
        async function updateFactureStatus(factureId) {
            try {
                const userId = firebase.auth().currentUser.uid;
                
                // Récupérer la facture
                const factureDoc = await firebase.firestore()
                    .collection('users').doc(userId)
                    .collection('factures')
                    .doc(factureId)
                    .get();
                
                if (!factureDoc.exists) return;
                
                const facture = { id: factureDoc.id, ...factureDoc.data() };
                
                // Recalculer son statut
                const updatedFacture = await calculateFactureStatus(facture, userId);
                
                // Mettre à jour dans Firestore
                await firebase.firestore()
                    .collection('users').doc(userId)
                    .collection('factures')
                    .doc(factureId)
                    .update({
                        statut: updatedFacture.statut,
                        resteAPayer: updatedFacture.resteAPayer
                    });
                
                // Recharger la liste des factures impayées
                await loadFacturesImpayees();
                
            } catch (error) {
                console.error('Erreur mise à jour statut facture:', error);
            }
        }

        // ===== CALCULER LE STATUT D'UNE FACTURE =====
        // Retourne la facture enrichie avec totalPaiements et resteAPayer
        async function calculateFactureStatus(facture, userId) {
            try {
                const paiementsSnap = await firebase.firestore()
                    .collection('users').doc(userId)
                    .collection('paiements')
                    .where('factureId', '==', facture.id)
                    .get();

                let totalPaiements = 0;
                paiementsSnap.forEach(doc => {
                    totalPaiements += doc.data().montant;
                });

                facture.totalPaiements = totalPaiements;
                facture.resteAPayer = facture.montant - totalPaiements;

                // Statut calculé
                if (facture.resteAPayer <= 0) {
                    facture.statut = 'paye';
                } else if (totalPaiements > 0) {
                    facture.statut = 'partiel';
                } else {
                    facture.statut = 'impaye';
                }

                return facture;

            } catch (error) {
                console.error('Erreur calcul statut:', error);
                facture.totalPaiements = 0;
                facture.resteAPayer = facture.montant;
                facture.statut = 'impaye';
                return facture;
            }
        }

        // ===== CHARGER L'HISTORIQUE DES PAIEMENTS =====
        async function loadPaiements() {
            try {
                const userId = firebase.auth().currentUser.uid;
                const snapshot = await firebase.firestore()
                    .collection('users').doc(userId)
                    .collection('paiements')
                    .orderBy('date', 'desc')
                    .get();

                paiements = [];
                snapshot.forEach(doc => {
                    paiements.push({ id: doc.id, ...doc.data() });
                });

                displayPaiements(paiements);

            } catch (error) {
                console.error('Erreur chargement paiements:', error);
            }
        }

        // ===== AFFICHER LES FACTURES IMPAYÉES =====
        function displayFacturesImpayees(liste) {
            const el = document.getElementById('facturesImpayeesList');
            const count = document.getElementById('facturesImpayeesCount');

            // Filtrer uniquement les non payées
            const enAttente = liste.filter(f => f.statut !== 'paye');
            count.textContent = `${enAttente.length} facture${enAttente.length > 1 ? 's' : ''}`;

            if (enAttente.length === 0) {
                el.innerHTML = `<div class="empty-state"><p>Aucune facture en attente 🎉</p></div>`;
                return;
            }

            el.innerHTML = enAttente.map(facture => {
                const statutClass = facture.statut === 'impaye' ? 'status-unpaid' : 'status-partial';
                const statutText = facture.statut === 'impaye' ? 'Impayé' : 'Partiel';
                const dateFormatee = formatDate(facture.date);

                return `
                    <div class="facture-card">
                        <div class="facture-info">
                            <div class="facture-header">
                                <h4 class="facture-client">${facture.clientNom}</h4>
                                <span class="facture-status ${statutClass}">${statutText}</span>
                            </div>
                            <p class="facture-description">${facture.description || ''}</p>
                            <p class="facture-date">📅 ${dateFormatee}</p>
                        </div>
                        <div class="facture-amounts">
                            <div class="amount-row">
                                <span class="amount-label">Total :</span>
                                <span>${formatAmount(facture.montant)}</span>
                            </div>
                            <div class="amount-row">
                                <span class="amount-label">Payé :</span>
                                <span class="amount-paid">${formatAmount(facture.totalPaiements)}</span>
                            </div>
                            <div class="amount-row">
                                <span class="amount-label">Reste :</span>
                                <span class="amount-due">${formatAmount(facture.resteAPayer)}</span>
                            </div>
                            <div class="facture-actions">
                                <button class="btn-pay" onclick="openPaiementModal('${facture.id}')">
                                    💵 Payer
                                </button>
                                <button class="btn-whatsapp" onclick="relancerWhatsApp('${facture.clientNom}', ${facture.resteAPayer}, '${dateFormatee}')">
                                    📱 Relancer
                                </button>
                                <button class="btn-email" onclick="relancerEmail('${facture.id}')">
                                    📧 Email
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ===== AFFICHER L'HISTORIQUE =====
        function displayPaiements(liste) {
            const el = document.getElementById('paiementsList');
            const count = document.getElementById('paiementsCount');

            count.textContent = `${liste.length} paiement${liste.length > 1 ? 's' : ''}`;

            if (liste.length === 0) {
                el.innerHTML = `<div class="empty-state"><p>Aucun paiement enregistré</p></div>`;
                return;
            }

            const methodes = {
                cash: '💵 Cash',
                orange_money: '🟠 Orange Money',
                wave: '🟡 Wave',
                mtn: '🟡 MTN Money'
            };

            el.innerHTML = liste.map(p => `
                <div class="paiement-card">
                    <div class="paiement-info">
                        <div class="paiement-header">
                            <h4>${p.clientNom || 'Client'}</h4>
                            <span class="paiement-methode">${methodes[p.methode] || p.methode}</span>
                        </div>
                        <p class="paiement-description">${p.note || 'Paiement enregistré'}</p>
                        <p class="paiement-date">📅 ${formatDate(p.date)}</p>
                    </div>
                    <div class="paiement-amount">
                        <div class="amount-highlight">${formatAmount(p.montant)}</div>
                        <div class="facture-ref">Facture : ${p.factureDescription || 'N/A'}</div>
                    </div>
                </div>
            `).join('');
        }

        // ===== OUVRIR MODAL PAIEMENT =====
        function openPaiementModal(factureId = null) {
            const modal = document.getElementById('paiementModal');
            document.getElementById('paiementForm').reset();
            document.getElementById('paiementDate').value = new Date().toISOString().split('T')[0];
            currentFactureId = factureId;

            if (factureId) {
                const facture = factures.find(f => f.id === factureId);
                if (!facture) return;

                // Stocker les infos dans les champs cachés
                document.getElementById('factureId').value = facture.id;
                document.getElementById('clientId').value = facture.clientId || '';
                document.getElementById('clientNom').value = facture.clientNom || '';
                document.getElementById('factureDescription').value = facture.description || '';
                document.getElementById('resteAPayer').value = facture.resteAPayer;

                // Afficher les infos
                document.getElementById('factureInfo').innerHTML = `
                    <div class="selected-facture">
                        <strong>${facture.clientNom}</strong><br>
                        ${facture.description || ''}<br>
                        Total : ${formatAmount(facture.montant)}<br>
                        Déjà payé : ${formatAmount(facture.totalPaiements)}<br>
                        <span class="remaining-amount">Reste : ${formatAmount(facture.resteAPayer)}</span>
                    </div>
                `;

                // Limiter le montant au reste à payer
                document.getElementById('paiementMontant').max = facture.resteAPayer;
                document.getElementById('paiementMontant').value = facture.resteAPayer;
            } else {
                document.getElementById('factureInfo').innerHTML = `
                    <em style="color:var(--muted)">Sélectionnez une facture dans la liste</em>
                `;
            }

            modal.classList.add('show');
        }

        function closePaiementModal() {
            document.getElementById('paiementModal').classList.remove('show');
            currentFactureId = null;
        }

        // ===== SAUVEGARDER UN PAIEMENT =====
        async function savePaiement(e) {
            e.preventDefault();

            const userId = firebase.auth().currentUser.uid;
            const factureId = document.getElementById('factureId').value;

            // Vérification — factureId obligatoire
            if (!factureId) {
                alert('Veuillez sélectionner une facture en cliquant sur le bouton 💵 Payer d\'une facture dans la liste.');
                return;
            }

            const montantPaye = parseFloat(document.getElementById('paiementMontant').value);
            const resteAvant = parseFloat(document.getElementById('resteAPayer').value);

            if (montantPaye <= 0) {
                alert('Le montant doit être supérieur à 0.');
                return;
            }

            if (montantPaye > resteAvant) {
                alert(`Le montant ne peut pas dépasser le reste à payer (${formatAmount(resteAvant)})`);
                return;
            }

            const paiementData = {
                factureId: factureId,
                clientId: document.getElementById('clientId').value,
                clientNom: document.getElementById('clientNom').value,
                factureDescription: document.getElementById('factureDescription').value,
                montant: montantPaye,
                methode: document.getElementById('paiementMethode').value,
                date: new Date(document.getElementById('paiementDate').value),
                note: document.getElementById('paiementNote').value,
                createdAt: new Date()
            };

            try {
                // 1. Enregistrer le paiement
                await firebase.firestore()
                    .collection('users').doc(userId)
                    .collection('paiements')
                    .add(paiementData);

                // 2. Calculer nouveau reste
                const nouveauReste = Math.max(0, resteAvant - montantPaye);

                // 3. Nouveau statut
                let nouveauStatut = 'impaye';
                if (nouveauReste <= 0) {
                    nouveauStatut = 'paye';
                } else if (montantPaye > 0) {
                    nouveauStatut = 'partiel';
                }

                // 4. Mettre à jour la facture
                await firebase.firestore()
                    .collection('users').doc(userId)
                    .collection('factures').doc(factureId)
                    .update({
                        statut: nouveauStatut,
                        resteAPayer: nouveauReste,
                        dernierPaiement: new Date()
                    });

                alert('Paiement enregistré avec succès !');
                closePaiementModal();
                
                // Mettre à jour automatiquement la liste des factures
                await updateFactureStatus(factureId);
                
                // Recharger les deux listes
                await loadFacturesImpayees();
                await loadPaiements();

            } catch (error) {
                console.error('Erreur sauvegarde paiement:', error);
                alert('Erreur lors de l\'enregistrement. Vérifiez votre connexion et réessayez.');
            }
        }

        // ===== RELANCE WHATSAPP =====
        function relancerWhatsApp(nom, reste, date) {
            const message = `Bonjour ${nom},\n\nNous vous rappelons que votre facture du ${date} présente un solde impayé de ${formatAmount(reste)}.\n\nMerci de régulariser dans les plus brefs délais.\n\n— FNE CashFlow`;
            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        }

        // ===== RELANCE EMAIL (mailto) =====
        function relancerEmail(factureId) {
            const facture = factures.find(f => f.id === factureId);
            if (!facture) return;

            const sujet = `Rappel de paiement — Facture du ${formatDate(facture.date)}`;
            const corps = `Bonjour ${facture.clientNom},\n\nNous vous rappelons que votre facture d'un montant de ${formatAmount(facture.montant)} présente un solde impayé de ${formatAmount(facture.resteAPayer)}.\n\nMerci de régulariser dans les plus brefs délais.\n\nCordialement,\nFNE CashFlow`;

            window.open(`mailto:?subject=${encodeURIComponent(sujet)}&body=${encodeURIComponent(corps)}`, '_blank');
        }

        // ===== UTILITAIRES =====
        function formatDate(date) {
            if (!date) return 'N/A';
            // Gérer les Timestamps Firestore et les dates JS
            const d = date?.toDate ? date.toDate() : new Date(date);
            return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function formatAmount(amount) {
            if (isNaN(amount)) return '0 FCFA';
            return new Intl.NumberFormat('fr-FR').format(Math.round(amount)) + ' FCFA';
        }

    </script>
</body>
</html>
